<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — CNG Ventures Inc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EAECF0; --card:#ffffff; --border:#d3d8e0;
  --text:#000000; --muted:#233D4D; --accent:#233D4D; --accent2:#FE7F2D;
  --navy:#000000;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.6;
}
h1,h2,.brand{font-weight:800;}
a{color:inherit; text-decoration:none;}
.container{max-width:1120px; margin:0 auto; padding:0 24px;}
header{background:var(--navy); border-bottom:1px solid var(--accent);}
nav{display:flex; align-items:center; justify-content:space-between; height:72px;}
.brand{font-size:1.15rem; color:#EAECF0;}
.brand span{color:var(--accent2);}
.back{color:#EAECF0; font-size:0.95rem;}
.back:hover{color:var(--accent2);}
.head{padding:64px 0 32px; text-align:center;}
.head h1{font-size:clamp(2rem,4.5vw,2.8rem); letter-spacing:-0.02em; margin-bottom:14px;}
.head p{color:var(--muted); max-width:560px; margin:0 auto; font-size:1.05rem;}
.form-wrap{max-width:560px; margin:0 auto; padding:0 24px 96px;}
.card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:36px 32px;}
label{display:block; font-size:0.85rem; font-weight:700; color:var(--accent); margin-bottom:6px;}
.field{margin-bottom:20px;}
input, textarea{
  width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:8px;
  font-family:inherit; font-size:0.95rem; background:#fff; color:var(--text);
}
input:focus, textarea:focus{outline:2px solid var(--accent2); outline-offset:1px;}
textarea{resize:vertical; min-height:120px;}
.btn-send{
  width:100%; padding:14px; border:none; border-radius:9px; background:var(--accent2);
  color:#fff; font-weight:700; font-size:1rem; cursor:pointer; transition:opacity .15s ease;
}
.btn-send:hover{opacity:0.9;}
.btn-send:disabled{opacity:0.6; cursor:not-allowed;}
.thanks{display:none; text-align:center; padding:20px 4px;}
.thanks p{color:var(--muted); font-size:1.05rem;}
.error{display:none; color:#b3261e; font-size:0.9rem; margin-top:-10px; margin-bottom:16px;}
</style>
</head>
<body>

<header>
  <div class="container">
    <nav>
      <a href="index.html" class="brand">CNG <span>Ventures</span> Inc.</a>
      <a href="index.html" class="back">← Back to Home</a>
    </nav>
  </div>
</header>

<section class="head">
  <div class="container">
    <h1>Contact Us</h1>
    <p>Have a question or opportunity to discuss? Send us a message.</p>
  </div>
</section>

<div class="form-wrap">
  <div class="card">
    <form id="contact-form" action="https://formsubmit.co/ajax/christopher@itomoyo.com" method="POST">
      <input type="hidden" name="_subject" value="New message from CNG Ventures website">
      <input type="text" name="_honey" style="display:none">
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="Full Name" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="Email" required>
      </div>
      <div class="field">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="Phone Number" required>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="Message" required></textarea>
      </div>
      <div class="error" id="form-error">Something went wrong. Please try again or email christopher@itomoyo.com directly.</div>
      <button type="submit" class="btn-send" id="send-btn">Send Message</button>
    </form>
    <div class="thanks" id="thanks">
      <h2>Thank you for your message.</h2>
      <p>A member of our team will respond within 24–48 hours.</p>
    </div>
  </div>
</div>

<script>
document.getElementById('contact-form').addEventListener('submit', function(e){
  e.preventDefault();
  var form = e.target;
  var btn = document.getElementById('send-btn');
  var err = document.getElementById('form-error');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Sending...';
  fetch(form.action, {
    method: 'POST',
    headers: { 'Accept': 'application/json' },
    body: new FormData(form)
  }).then(function(res){
    if(!res.ok) throw new Error('send failed');
    form.style.display = 'none';
    document.getElementById('thanks').style.display = 'block';
  }).catch(function(){
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Send Message';
  });
});
</script>

</body>
</html>
